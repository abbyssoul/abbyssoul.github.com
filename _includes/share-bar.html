{%- assign raw_share_url = page.url | absolute_url -%}
{%- assign share_url = raw_share_url | uri_escape -%}
{%- assign share_title = page.title | uri_escape -%}
<section class="share-bar" aria-labelledby="share-title">
  <h2 id="share-title">Share this article</h2>
  <div class="share-actions">
    <button type="button" class="share-link" data-copy-url="{{ raw_share_url | escape }}">Copy link</button>
    <a class="share-link" href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url }}">LinkedIn</a>
    <a class="share-link" href="https://www.reddit.com/submit?url={{ share_url }}&amp;title={{ share_title }}">Reddit</a>
    <a class="share-link" href="mailto:?subject={{ share_title }}&amp;body={{ share_url }}">Email</a>
  </div>
  <p class="share-status" aria-live="polite"></p>
</section>

<script>
  (() => {
    const button = document.querySelector('[data-copy-url]');
    if (!button) return;
    const status = button.closest('.share-bar').querySelector('.share-status');
    button.addEventListener('click', async () => {
      const url = button.dataset.copyUrl;
      try {
        await navigator.clipboard.writeText(url);
        status.textContent = 'Link copied.';
      } catch (_error) {
        window.prompt('Copy this link:', url);
      }
    });
  })();
</script>
