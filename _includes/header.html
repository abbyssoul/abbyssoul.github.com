<header class="site-header" role="banner">
  <div class="container header-inner">
    <a href="{{ '/' | relative_url }}" class="site-brand" aria-label="{{ site.title }} home">
      <span class="site-name">{{ site.title }}</span>
      <span class="site-description">{{ site.tagline }}</span>
    </a>

    <nav class="primary-nav" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Writing</a>
      <a href="{{ '/topics/' | relative_url }}"{% if page.url == '/topics/' %} aria-current="page"{% endif %}>Topics</a>
      <a href="{{ '/projects/' | relative_url }}"{% if page.url contains '/projects/' %} aria-current="page"{% endif %}>Projects</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>About</a>
    </nav>
  </div>
</header>
