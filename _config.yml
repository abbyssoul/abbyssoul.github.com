# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Abyss of Software Engineering
tagline: 'Practical notes on building software that has to work'
description: >- # this means to ignore newlines until "baseurl:"
  Practical essays on C++, Rust, Go, reliable and real-time systems, 3D
  graphics, simulation, computational physics, and AI-enabled engineering by
  Ivan Ryabov.
domain: abbyssoul.github.io
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://abbyssoul.github.io" # the base hostname & protocol for your site, e.g. http://example.com
lang: en-AU
locale: en_AU
timezone: Australia/Sydney
# twitter_username: abbyssoul
github_username:  abbyssoul
email: abyss.tech.blog@gmail.com

author:
  name: Ivan Ryabov
  url: https://abbyssoul.github.io/about/
  bio: Software engineer experienced in C++, Rust, Go, real-time and computational systems, and AI-enabled engineering.

social:
  name: Ivan Ryabov
  links:
    - https://github.com/abbyssoul
    - https://www.linkedin.com/in/iryabov/

logo: /assets/android-chrome-512x512.png

webmaster_verifications:
  bing: 24D56E0A1E42D8EC45CDAFD398FDA201

# Add a GA4 measurement ID (G-...) here if analytics is enabled again.
google_analytics: G-PHK9Z8YPEB

# URL of your avatar or profile pic (you could use your GitHub profile pic)
# avatar:

# Includes an icon in the footer for each username you enter
footer-links:
  dribbble:
  email: abyss.tech.blog@gmail.com
  facebook:
  flickr:
  github: abbyssoul
  instagram:
  linkedin: iryabov
  pinterest:
  rss: any_value_enables_this
  twitter:
  stackoverflow: # your stackoverflow profile, e.g. "users/50476/bart-kiers"
  youtube: # channel/<your_long_string> or user/<user-name>
  googleplus: # anything in your profile username that comes after plus.google.com/


# Build settings
# theme: minima
# Set the Sass partials directory, as we're using @imports
sass:
  style: :compressed

# Use the following plug-ins
plugins:
  - jekyll-sitemap # Create a sitemap using the official Jekyll sitemap gem
  - jekyll-feed # Create an Atom feed using the official Jekyll feed gem
  - jekyll-seo-tag
  - jekyll-redirect-from

collections:
  tags:
    output: true
    permalink: /tag/:name/

defaults:
  -
    scope:
      path: ""
      type: tags
    values:
      layout: posts_by_tag
  -
    scope:
      path: ""
      type: posts
    values:
      author:
        name: Ivan Ryabov
        url: https://abbyssoul.github.io/about/

# Jekyll 3 now only supports Kramdown for Markdown
kramdown:
  # Use GitHub flavored markdown, including triple backtick fenced code blocks
  input: GFM
  # Jekyll 3 and GitHub Pages now only support rouge for syntax highlighting
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    # Use existing pygments syntax highlighting css
    css_class: 'highlight'


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
exclude:
  - script
  - vendor
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
