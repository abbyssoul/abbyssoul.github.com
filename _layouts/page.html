---
layout: default
---
<article class="page-shell">

  <header class="page-header">
    <h1>{{ page.title | escape }}</h1>
    {%- if page.description -%}
    <p class="page-deck">{{ page.description | escape }}</p>
    {%- endif -%}
  </header>

  <div class="page-body post-content">
    {{ content }}
  </div>

</article>
