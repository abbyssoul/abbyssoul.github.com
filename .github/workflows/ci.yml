name: CI

on:
  push:
    branches:
      - master
      - gh-pages
      - 'pages-*'
  pull_request:
    branches:
      - master
      - gh-pages
      - 'pages-*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NOKOGIRI_USE_SYSTEM_LIBRARIES: true

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Run CI build
        run: |
          # ./script/cibuild
          bundle exec jekyll build
          # Canonical links to this site are covered by the internal-link check.
          # Medium, PhoneArena, and TIME reject automated link-check requests.
          bundle exec htmlproofer ./_site \
            --no-enforce-https \
            --ignore-empty-mailto \
            --no-check-external-hash \
            --ignore-urls '/^https:\/\/abbyssoul\.github\.io\//,/^https:\/\/medium\.com\//,/^https:\/\/www\.phonearena\.com\//,/^https:\/\/time\.com\//'
